name: GitHub Pages

on:
  push:
    branches:
      - main  # Set a branch name to trigger deployment
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-22.04
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.151.2'
          extended: true

      - name: Fetch XTimelineViewer README
        run: |
          python3 - << 'EOF'
          import urllib.request

          url = "https://raw.githubusercontent.com/daruyanagi/XTimelineViewer/main/README.md"
          with urllib.request.urlopen(url) as f:
              content = f.read().decode("utf-8")

          lines = content.split("\n")
          title = "XTimelineViewer"
          body_start = 0
          for i, line in enumerate(lines):
              if line.startswith("# "):
                  title = line[2:].strip()
                  body_start = i + 1
                  break

          body = "\n".join(lines[body_start:]).lstrip("\n")

          front_matter = f'---\ntitle: "{title}"\n---\n\n'

          import os
          os.makedirs("content/apps/xtimelineviewer", exist_ok=True)
          with open("content/apps/xtimelineviewer/index.md", "w", encoding="utf-8") as f:
              f.write(front_matter + body)

          print(f"Generated: {title}")
          EOF

      - name: Build
        run: hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          cname: daruyanagi.jp

