{{ with .Site.Params.adsenseSlot }}
<div style="margin: 2rem 0;">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="{{ $.Site.Params.adsensePublisher }}"
       data-ad-slot="{{ . }}"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
{{ end }}
